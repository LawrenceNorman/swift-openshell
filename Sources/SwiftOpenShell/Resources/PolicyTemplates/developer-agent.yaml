# OpenShell Policy: Developer Agent
# Full dev environment with LLM APIs, GitHub, and package registries
version: 1
filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /etc
    - /proc
    - /dev/urandom
  read_write:
    - /tmp
  blocked:
    - ~/.ssh
    - ~/Library/Keychains
    - ~/.gnupg
network_policies:
  llm-apis:
    name: llm-apis
    endpoints:
      - host: api.anthropic.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: api.openai.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: generativelanguage.googleapis.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /usr/local/bin/claude
      - path: /usr/local/bin/codex
  github:
    name: github
    endpoints:
      - host: "*.github.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
      - host: "*.githubusercontent.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
    binaries:
      - path: /usr/bin/git
      - path: /usr/local/bin/gh
  package-registries:
    name: package-registries
    endpoints:
      - host: registry.npmjs.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: pypi.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: files.pythonhosted.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
process:
  run_as_user: sandbox
  run_as_group: sandbox
  max_runtime_seconds: 1800
landlock:
  compatibility: best_effort
